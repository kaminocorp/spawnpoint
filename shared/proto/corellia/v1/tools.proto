syntax = "proto3";
package corellia.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/hejijunhao/corellia/backend/internal/gen/corellia/v1;corelliav1";

// ToolService — v1.5 Pillar B tools governance.
//
// Phase 2 (shipped): GetToolManifest — adapter-to-control-plane boot-time
// fetch (per-instance bearer token, mounted outside the Supabase JWT group).
//
// Phase 3 (this file): the operator-facing read/write RPCs for the catalog,
// org curation, and per-instance grants. All Supabase-JWT-gated. Phases 4+
// consume them from the wizard, settings page, and fleet inspector.
service ToolService {
  // GetToolManifest is called by the adapter entrypoint at boot (and by the
  // Phase 5 corellia_guard plugin's daemon poll thread). Auth is a per-instance
  // opaque bearer token stored as a Fly app secret — *not* a Supabase JWT.
  // The full URL is stored as CORELLIA_TOOL_MANIFEST_URL in the adapter's env.
  rpc GetToolManifest(GetToolManifestRequest) returns (GetToolManifestResponse);

  // ListTools returns the toolset catalog for a harness adapter, with the
  // caller's org curation merged in. Read-path; any authed user.
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // GetOrgToolCuration returns the catalog with per-toolset enabled flags.
  // Same shape as ListTools but always scoped to the caller's org.
  // Read-path; any authed user (the settings page renders read-only for
  // non-admins, gated server-side at SetOrgToolCuration).
  rpc GetOrgToolCuration(GetOrgToolCurationRequest) returns (GetOrgToolCurationResponse);

  // SetOrgToolCuration toggles a single toolset on/off for the caller's org.
  // Write-path; org-admin role only (PermissionDenied otherwise).
  rpc SetOrgToolCuration(SetOrgToolCurationRequest) returns (SetOrgToolCurationResponse);

  // GetInstanceToolGrants returns the active grants for an agent instance.
  // Read-path; instance must belong to caller's org.
  rpc GetInstanceToolGrants(GetInstanceToolGrantsRequest) returns (GetInstanceToolGrantsResponse);

  // SetInstanceToolGrants atomically replaces the grant set for an instance.
  // Each grant is validated against the toolset's scope_shape; a single
  // failure rolls back the entire set. On success, manifest_version bumps
  // (Phase 5 plugin polls this for ETag invalidation). Instance must
  // belong to caller's org.
  rpc SetInstanceToolGrants(SetInstanceToolGrantsRequest) returns (SetInstanceToolGrantsResponse);
}

message GetToolManifestRequest {
  // instance_id is included for request validation and server-side logging.
  // The bearer token in Authorization is the primary identity signal.
  string instance_id = 1;
}

message GetToolManifestResponse {
  ToolManifest manifest = 1;
}

// ToolManifest is the per-instance toolset configuration fetched by the
// adapter at boot. The adapter renders it into:
//   - $HERMES_HOME/config.yaml  (platform_toolsets.cli list)
//   - $HERMES_HOME/.env         (per-toolset credential env vars)
//
// In Phase 2 the env map is always empty — credentials are set as Fly app
// secrets at spawn time and are already available as process env vars.
// Phase 7 (fleet-view grant editor) will populate env when credentials are
// added post-spawn.
message ToolManifest {
  string instance_id = 1;
  string adapter_version = 2;
  repeated EquippedToolset toolsets = 3;
  // env carries resolved credential values for toolsets that require them.
  map<string, string> env = 4;
  // manifest_version is a monotonic counter incremented on each grant write
  // (Phase 3 SetInstanceGrants). Returned as an ETag by the handler; the
  // Phase 5 plugin poll daemon sends If-None-Match to avoid re-rendering
  // scope.json when nothing has changed.
  int64 manifest_version = 5;
}

// EquippedToolset describes a single toolset that has been granted to the
// agent instance. scope mirrors the grant's scope_json, shaped by the
// toolset's scope_shape.
message EquippedToolset {
  string toolset_key = 1;
  // scope is a free-form JSON object whose keys are defined by the
  // toolset's scope_shape column (e.g. url_allowlist, command_allowlist).
  google.protobuf.Struct scope = 2;
}

// Tool is the catalog row projected to the wire. enabled_for_org carries
// the merged org-curation state — the FE filters with this flag rather
// than making a second round-trip. icon is empty until Phase 4's design
// pass; oauth_only=true rows render as locked in Phase 4.
message Tool {
  string id = 1;
  string toolset_key = 2;
  string display_name = 3;
  string description = 4;
  string category = 5; // "info" | "compute" | "integration"
  string icon = 6;
  bool default_on_in_hermes = 7;
  bool oauth_only = 8;
  // scope_shape is the JSON shape spec the FE uses to render scope inputs
  // (url_allowlist → multiline glob input, command_allowlist → regex list,
  // etc.). Empty Struct means the toolset has no operator-configurable scope.
  google.protobuf.Struct scope_shape = 9;
  repeated string required_env_vars = 10;
  string adapter_version = 11;
  // enabled_for_org is true when the caller's org has not curated this
  // toolset out. ListTools merges from the org_tool_curation join.
  bool enabled_for_org = 12;
}

message ListToolsRequest {
  // harness_adapter_id is the catalog scope. v1.5 has one Hermes adapter,
  // so the FE will typically pass the only known ID — but the field is
  // explicit so v2's multi-harness world is a non-breaking change.
  string harness_adapter_id = 1;
  // adapter_version pins the catalog generation. Empty string means
  // "current adapter version" (the server resolves to currentAdapterVersion).
  string adapter_version = 2;
}
message ListToolsResponse {
  repeated Tool tools = 1;
}

message GetOrgToolCurationRequest {
  string harness_adapter_id = 1;
  string adapter_version = 2;
}
message GetOrgToolCurationResponse {
  repeated Tool tools = 1;
}

message SetOrgToolCurationRequest {
  string tool_id = 1;
  bool enabled = 2;
}
message SetOrgToolCurationResponse {
  // Echo of the tool with its new enabled_for_org flag so the FE doesn't
  // need to re-fetch.
  Tool tool = 1;
}

// ToolGrant is one active grant projected to the wire. tool_id keys back to
// the catalog row; toolset_key + display_name are denormalised so the FE
// can render the grant card without a join. has_credential is true iff
// credential_storage_ref is set — the raw ref is intentionally not exposed
// (blueprint §11.6: opaque reference, never on the wire).
message ToolGrant {
  string id = 1;
  string tool_id = 2;
  string toolset_key = 3;
  string display_name = 4;
  google.protobuf.Struct scope = 5;
  bool has_credential = 6;
  string granted_at = 7; // RFC3339
}

message GetInstanceToolGrantsRequest {
  string instance_id = 1;
}
message GetInstanceToolGrantsResponse {
  repeated ToolGrant grants = 1;
}

// ToolGrantInput is one grant in a SetInstanceToolGrants payload. The full
// set is replaced atomically — partial updates are not expressible. Omitted
// tool_ids are revoked; included ones are inserted (or kept).
message ToolGrantInput {
  string tool_id = 1;
  google.protobuf.Struct scope = 2;
  // credential_storage_ref is the opaque reference into the secret store.
  // For Phase 3 the FE writes nothing here (credential capture is wired in
  // Phase 4); the field is reserved so the wire shape is stable.
  string credential_storage_ref = 3;
}

message SetInstanceToolGrantsRequest {
  string instance_id = 1;
  repeated ToolGrantInput grants = 2;
}
message SetInstanceToolGrantsResponse {
  repeated ToolGrant grants = 1;
  // manifest_version after the write. The FE doesn't need this for v1.5,
  // but exposing it makes round-trip ETag tests trivial.
  int64 manifest_version = 2;
}
