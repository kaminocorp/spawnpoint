version: v2
plugins:
  # Backend — Go
  - remote: buf.build/protocolbuffers/go
    out: ../../backend/internal/gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: ../../backend/internal/gen
    opt: paths=source_relative

  # Frontend — TS (Connect-ES v2: @bufbuild/protoc-gen-es emits messages +
  # service descriptors into *_pb.ts. No separate connect-es codegen plugin.)
  - local: ../../frontend/node_modules/.bin/protoc-gen-es
    out: ../../frontend/src/gen
    opt:
      - target=ts
